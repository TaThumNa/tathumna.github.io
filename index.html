<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaThumNa | Home Portal</title>
    <style>
        :root {
            --primary: #66fcf1;
            --bg: #0b0c10;
            --card: #1f2833;
        }
        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        header {
            padding: 60px 20px;
            text-align: center;
        }
        h1 { color: var(--primary); font-size: 3rem; letter-spacing: 3px; margin: 0; }
        
        .portal-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            width: 90%;
            max-width: 1100px;
            padding: 20px;
        }

        /* ตกแต่งปุ่ม Link */
        .portal-link {
            text-decoration: none;
            color: inherit;
        }

        .portal-card {
            background-color: var(--card);
            border: 2px solid #45a29e;
            border-radius: 15px;
            padding: 40px 20px;
            text-align: center;
            transition: 0.3s;
            cursor: pointer;
        }

        .portal-card:hover {
            border-color: var(--primary);
            transform: translateY(-10px);
            box-shadow: 0 10px 30px rgba(102, 252, 241, 0.2);
        }

        .portal-card h2 { color: var(--primary); margin-bottom: 10px; }
        .portal-card p { color: #c5c6c7; font-size: 0.9rem; }

        footer { margin-top: auto; padding: 40px; color: #45a29e; font-size: 0.8rem; }
    </style>
</head>
<body>

    <header>
        <h1>TATHUMNA</h1>
        <p>ยินดีต้อนรับสู่ศูนย์กลางข้อมูลและบริการ</p>
    </header>

    <div class="portal-grid">
        <a href="game-info.html" class="portal-link">
            <div class="portal-card">
                <h2>ข้อมูลเกม</h2>
                <p>เจาะลึกเทคนิค ไอเทม และเงื่อนไขการได้รับ</p>
            </div>
        </a>

        <a href="store.html" class="portal-link">
            <div class="portal-card">
                <h2>ร้านค้า</h2>
                <p>เลือกซื้อไอเทมและบริการคุณภาพจากเรา</p>
            </div>
        </a>

        <a href="valuation.html" class="portal-link">
            <div class="portal-card">
                <h2>ประเมินราคา</h2>
                <p>ตรวจสอบมูลค่าไอเทมในตลาดกลางให้แม่นยำ</p>
            </div>
        </a>
    </div>

    <footer>
        &copy; 2026 TaThumNa Studio | จัดการระบบโดยเจ้าของตัวจริง
    </footer>

</body>
</html>
