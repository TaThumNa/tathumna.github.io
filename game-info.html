<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Database | TaThumNa</title>
    <style>
        :root { --primary: #66fcf1; --bg: #0b0c10; --card: #1f2833; }
        body { background-color: var(--bg); color: white; font-family: sans-serif; margin: 0; text-align: center; }
        header { padding: 40px; border-bottom: 1px solid var(--primary); }
        .container { padding: 20px; max-width: 800px; margin: auto; }
        
        /* สไตล์ตารางข้อมูล (ดูโปรและทางการ) */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: var(--card); }
        th, td { border: 1px solid #45a29e; padding: 12px; text-align: left; }
        th { background-color: #0b0c10; color: var(--primary); }
        
        .back-link { display: inline-block; margin-top: 30px; color: var(--primary); text-decoration: none; }
    </style>
</head>
<body>
    <header>
        <h1>คลังข้อมูลเกม</h1>
        <p>เจาะลึกสถิติและวิธีการได้รับไอเทม Rare</p>
    </header>

    <div class="container">
        <h2>Blox Fruits: ดาบระดับ Mythical</h2>
        <table>
            <tr>
                <th>ชื่อดาบ</th>
                <th>โอกาสดรอป (%)</th>
                <th>วิธีได้รับ / เงื่อนไข</th>
            </tr>
            <tr>
                <td>Cursed Dual Katana</td>
                <td>Quest Line</td>
                <td>เลเวล 2200 + ทำภารกิจ Tushita & Yama</td>
            </tr>
            <tr>
                <td>Hallow Scythe</td>
                <td>5% (โดยประมาณ)</td>
                <td>กำจัด Raid Boss: Soul Reaper</td>
            </tr>
        </table>

        <a href="index.html" class="back-link">← กลับหน้าหลัก Portal</a>
    </div>
</body>
</html>
